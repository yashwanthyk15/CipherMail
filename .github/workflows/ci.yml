name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 black isort

      - name: Run Flake8
        run: |
          flake8 services/smtp-gateway services/ai-worker services/reputation-worker --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/smtp-gateway services/ai-worker services/reputation-worker --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          # pip install -r services/smtp-gateway/requirements.txt (Commented until file created)

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push SMTP Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./services/smtp-gateway
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/esg-smtp-gateway:latest
            ${{ steps.login-ecr.outputs.registry }}/esg-smtp-gateway:${{ env.IMAGE_TAG }}

      # Other builds follow similar pattern...
