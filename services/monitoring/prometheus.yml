global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-service'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics' # Would require adding Prometheus middleware to FastAPI

  - job_name: 'smtp-gateway'
    static_configs:
      - targets: ['smtp-gateway:8001']
    metrics_path: '/metrics'
