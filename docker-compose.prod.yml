version: '3.9'

services:
  smtp-gateway:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/esg-smtp-gateway:${IMAGE_TAG}
    restart: always
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARN
      - KAFKA_BROKER=kafka:9092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres.rds.amazonaws.com
      - POSTGRES_DB=email_gateway
      - POSTGRES_USER=${RDS_USERNAME}
      - POSTGRES_PASSWORD=${RDS_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
    ports:
      - "587:587"
      - "25:25"
    depends_on:
      - kafka
      - redis
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/email-security-gateway
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: smtp-gateway
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Kafka (managed by AWS MSK in production, but Docker for PoC)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - gateway
    volumes:
      - kafka_data:/var/lib/kafka/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - gateway

  # Redis (managed by AWS ElastiCache in production)
  redis:
    image: redis:7.0-alpine
    restart: always
    networks:
      - gateway
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/esg-api:${IMAGE_TAG}
    restart: always
    environment:
      - ENVIRONMENT=production
      - KAFKA_BROKER=kafka:9092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres.rds.amazonaws.com
      - POSTGRES_DB=email_gateway
      - POSTGRES_USER=${RDS_USERNAME}
      - POSTGRES_PASSWORD=${RDS_PASSWORD}
    ports:
      - "8001:8000"
    networks:
      - gateway

  ai-worker:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/esg-ai-worker:${IMAGE_TAG}
    restart: always
    environment:
      - ENVIRONMENT=production
      - KAFKA_BROKER=kafka:9092
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
    networks:
      - gateway

  reputation-worker:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/esg-reputation-worker:${IMAGE_TAG}
    restart: always
    environment:
      - ENVIRONMENT=production
      - KAFKA_BROKER=kafka:9092
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - REDIS_HOST=redis
    networks:
      - gateway

  dashboard:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/esg-dashboard:${IMAGE_TAG}
    restart: always
    networks:
      - gateway
    environment:
      - REACT_APP_API_URL=https://api.email-security-gateway.com
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./services/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - gateway
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gateway
    ports:
      - "3001:3000"

volumes:
  kafka_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  gateway:
    driver: bridge
